    <style>
        .hidden { display: none; }
        .correct { color: blue; }

<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">
    <h1 class="text-3xl font-bold mb-4">Type the Lyrics</h1>
    
    <select id="speed" class="mb-4 p-2 bg-gray-800 text-white rounded">
        <option value="normal">Normal</option>
        <option value="fast">Fast</option>
        <option value="insane">Insane</option>
    </select>
    
    <div class="bg-gray-800 p-6 rounded-lg shadow-lg w-full max-w-2xl">
        <textarea id="lyricsInput" class="w-full p-2 bg-gray-700 text-white rounded mb-4" rows="4" placeholder="Paste your lyrics here..."></textarea>
        <button id="loadLyrics" class="bg-blue-500 px-4 py-2 rounded">Load Lyrics</button>
        <p id="lyrics" class="text-lg mb-4 mt-4"></p>
        <div id="displayLyrics" class="text-lg mb-4"></div>
        <textarea id="userInput" class="w-full p-2 bg-gray-700 text-white rounded" rows="4" placeholder="Start typing..."></textarea>
        <p class="mt-4">Accuracy: <span id="accuracy">100%</span> | WPM: <span id="wpm">0</span></p>
    </div>
